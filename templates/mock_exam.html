<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <h1 class="page-title">Oral Exam</h1>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <style>
    body { font-family: system-ui, sans-serif; max-width: 680px; margin: 2rem auto; padding: 0 1rem; }
    button, select { font-size: 1rem; padding: .6rem .9rem; margin-right: .5rem; }
    .row { margin: 1rem 0; }
    .box { border: 1px solid #ddd; border-radius: 8px; padding: .75rem; background:#fff; min-height: 2.2rem; }
    .muted { color:#666; font-size:.95rem; }
  </style>
</head>
<body>
  <nav class="navbar">
  <div class="nav-left">
    <span class="logo">Project FireBeak</span>
  </div>
<!-- This is the NavBar -->
  <div class="nav-right">
    <a href="/" class="nav-link">Practice</a>
    <a href="/mock_exam" class="nav-link active">Mock Exam</a>
    <a href="/developer" class="nav-link">Developer</a>
  </div>
</nav>
<div class="container">
  <h1>Mock Exam</h1>
<p class="muted">Full mock exam experience. Feedback appears at the end.</p>

<!-- EXAM SETUP -->
<div class="card" id="setupCard">
  <h2>Exam Setup</h2>

  <div class="setup-row">
    <div class="field">
      <label>Language</label>
      <select id="examLanguage">
        <option value="english" selected>English</option>
        <option value="french">French</option>
        <option value="german">German</option>
      </select>
    </div>

    <div class="field">
      <label>Difficulty</label>
      <select id="difficulty">
        <option value="beginner">Beginner</option>
        <option value="moderate" selected>Moderate</option>
        <option value="expert">Expert</option>
      </select>
    </div>

    <div class="field">
      <label>Questions</label>
      <select id="examLength">
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="15" selected>15</option>
      </select>
    </div>
  </div>

  <div style="margin-top: 20px;">
    <button id="startMockBtn" class="btn-primary">
      Start Exam
    </button>
  </div>
</div>
</div>

<!-- QUESTION -->
<div class="card" id="questionCard">

  <div class="q-header">
    <div>
      <h2 style="margin:0;">Current Question</h2>
      <div id="progressText" class="muted" style="margin-top:4px;"></div>
    </div>

    <div class="q-controls">
      <div class="timer-pill">
        <span id="timer">00:00</span>
      </div>
    </div>
  </div>

  <!-- These are the buttons that let the user hear and skip questions -->
  <div id="question" class="box" style="margin-top:14px;"></div>

  <div class="question-actions">
    <button id="speakQBtn">🔊 Hear Question</button>
    <button id="skipBtn" disabled>⏭️ Skip</button>
  </div>

  <audio id="player" controls style="width:100%; margin-top:12px;"></audio>

</div>

<!-- TRANSCRIPT -->
<div class="card" id="answerCard">
  <h2>Your Answer</h2>

  <div id="transcript" class="box"></div>

  <div class="answer-controls">
    <button id="startRecBtn" class="record-btn" title="Start Recording"></button>
    <button id="stopRecBtn" class="stop-btn" title="Stop Recording" disabled></button>

    <button id="retryBtn" disabled>Retry</button>
    <button id="submitBtn" class="btn-primary" disabled>Submit Answer</button>
  </div>
</div>

<!-- FINISH -->
<div class="card">
  <button id="finishBtn" class="btn-primary" disabled>Finish & Show Feedback</button>
</div>

<!-- FINAL FEEDBACK -->
<div class="card" id="feedbackCard" style="display:none;">
  <h2>Final Feedback</h2>
  <div id="finalFeedback" class="box"></div>
    <button id="restartBtn" class="btn-primary" style="margin-top:15px;">
  Restart Exam
</button>
</div>

<!-- DICTIONARY -->
<div class="card" id="dictionaryCard">
  <h2>Dictionary</h2>
  <input type="text" id="dictInput" placeholder="Type a word..." />
  <button id="dictBtn">Look Up</button>

  <div id="dictResult" class="box" style="margin-top:10px;"></div>
</div>

<div id="status" class="muted" style="margin-top:15px;">Idle.</div>

<!-- This is the link for the Javascript that runs this code -->
<script src="{{ url_for('static', filename='js/mock_exam.js') }}"></script>
</body>
</html>
